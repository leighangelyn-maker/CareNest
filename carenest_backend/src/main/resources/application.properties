# Spring Boot Application Configuration
spring.application.name=carenest

# Set default profile to 'dev'
spring.profiles.active=dev

# Server (can be overridden by dev or prod)
server.port=8080
server.servlet.context-path=/

# JWT Default Configuration (can be overridden by dev or prod)
jwt.secret=carenest-super-secret-key-2026-32-bytes-long
jwt.expiration=900000

# Logging Defaults
logging.level.com.example.carenest=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# JWT Configuration
jwt.secret=${JWT_SECRET:carenest-super-secret-key-2026-32-bytes-long-!!!}
jwt.expiration=${JWT_EXPIRATION:3600000}  # 1 hour (3,600,000 ms)
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}  # 7 days
jwt.issuer=carenest-api

# Default Logging
logging.level.com.example.carenest=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Storage Configuration
storage.upload-dir=uploads
storage.documents-dir=documents

# Paystack Configuration
paystack.secret.key=${PAYSTACK_SECRET_KEY:sk_test_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx}
paystack.api.url=${PAYSTACK_API_URL:https://api.paystack.co}
paystack.callback-url=${PAYSTACK_CALLBACK_URL}
